<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pi — Button</title>
  <link rel="stylesheet" href="pi.css">
</head>
<body>

  <div id="playground">
    <canvas id="canvas"></canvas>

    <div id="resize_handle"></div>

    <div id="input_panel">
      <div class="panel-section">
        <label class="panel-label">Value</label>
        <div class="slider-wrap" data-min="0" data-max="1000" data-step="1" data-value="0" data-exp="true">
          <div class="slider-track"></div>
          <div class="slider-fill"></div>
          <div class="slider-thumb">0</div>
        </div>
      </div>
    </div>
  </div>

  <script src="playground.js"></script>

</body>
</html>
