<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pi — Button</title>
  <link rel="stylesheet" href="pi.css">
</head>
<body>

  <div id="playground">
    <canvas id="canvas"></canvas>

    <div id="resize_handle"></div>

    <div id="input_panel">

      <div class="pi-slider" id="sl_cycle" data-name="cycle" data-min="2" data-max="32" data-step="1" data-scale="quadratic" data-value="10"></div>

      <label class="panel-label">Sturmian picker</label>
      <div class="picker-box">
        <canvas id="picker_canvas"></canvas>
      </div>

      <div class="pi-slider" id="sl_offset" data-name="offset" data-min="0" data-max="1" data-step="0.01" data-scale="lin" data-value="0"></div>

      <div class="pi-slider" id="sl_length" data-name="length" data-min="1" data-max="96" data-step="1" data-scale="lin"></div>

    </div>
  </div>

  <script src="playground.js"></script>

</body>
</html>
