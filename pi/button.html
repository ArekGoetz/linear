<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pi — Button</title>
  <link rel="stylesheet" href="pi.css">
  <script>
  MathJax = {
    tex: { inlineMath: [['\\(', '\\)']] },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea'] }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>

  <div id="playground">
    <canvas id="canvas"></canvas>

    <div id="left_handle" class="resize-handle resize-handle--left"></div>

    <div id="left_panel" class="side-panel side-panel--left">
      <div class="panel-label">Formula</div>
      <div id="formula_display" class="formula-display"></div>
    </div>

    <div id="right_handle" class="resize-handle resize-handle--right"></div>
    <div id="picker_tooltip"></div>

    <div id="right_panel" class="side-panel side-panel--right">

      <div class="pi-slider" id="sl_cycle" data-min="2" data-max="32" data-step="1" data-scale="lin" data-value="10" tabindex="0" role="slider" aria-valuemin="2" aria-valuemax="32">
        <div class="pi-slider__label">cycle</div>
        <div class="pi-slider__rail">
          <div class="pi-slider__track"></div>
          <div class="pi-slider__fill"></div>
          <div class="pi-slider__thumb"></div>
        </div>
      </div>

      <div class="mechanical-group">
        <div class="panel-label">mechanical picker</div>
        <div id="slope_display" class="slope-display"></div>
        <div class="picker-box" id="picker_box">
          <canvas id="picker_canvas"></canvas>
        </div>
        <div id="word_display" class="word-display"></div>
      </div>

      <div class="pi-slider" id="sl_offset" data-min="-0.5" data-max="0.5" data-step="0.01" data-scale="lin" data-value="0" tabindex="0" role="slider" aria-valuemin="-0.5" aria-valuemax="0.5">
        <div class="pi-slider__label">offset</div>
        <div class="pi-slider__rail">
          <div class="pi-slider__track"></div>
          <div class="pi-slider__fill"></div>
          <div class="pi-slider__thumb"></div>
        </div>
      </div>

      <div class="pi-slider" id="sl_length" data-min="1" data-max="96" data-step="1" data-scale="lin" tabindex="0" role="slider" aria-valuemin="1" aria-valuemax="96">
        <div class="pi-slider__label">sum length</div>
        <div class="pi-slider__rail">
          <div class="pi-slider__track"></div>
          <div class="pi-slider__fill"></div>
          <div class="pi-slider__thumb"></div>
        </div>
      </div>

      <div class="pi-slider" id="sl_lattice" data-min="0" data-max="2" data-step="1" data-scale="lin" data-value="0" tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="2">
        <div class="pi-slider__label">cyclotomic lattice</div>
        <div class="pi-slider__rail">
          <div class="pi-slider__track"></div>
          <div class="pi-slider__fill"></div>
          <div class="pi-slider__thumb"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="playground.js"></script>

</body>
</html>
