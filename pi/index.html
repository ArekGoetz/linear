<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Playground</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111113;
      --text: rgb(248, 248, 248);

      --accent: rgb(200, 160, 220);
    }
    body {
      font-family: -apple-system, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 520px;
      margin: 60px auto;

    }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }

    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
    }
    a:hover, a:focus-visible { text-decoration: underline; outline-offset: 3px; }
    .desc { color: var(--text-dim); font-size: 0.83rem; margin-top: 3px; }
    .back { display: inline-block; margin-bottom: 28px; font-size: 0.85rem; color: var(--text-dim); text-decoration: none; }
