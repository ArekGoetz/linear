<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Real Analysis</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111113;
      --surface: rgba(42, 42, 48, 0.90);
      --text: rgb(248, 248, 248);
      --text-dim: rgb(220, 220, 220);
      --accent: rgb(160, 200, 170);
    }
    body {
      font-family: -apple-system, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 520px;
      margin: 60px auto;
      padding: 0 24px;
      -webkit-font-smoothing: antialiased;
    }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 32px; }
    .placeholder {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.6;
      border-left: 1px solid rgba(255, 255, 255, 0.15);
      padding-left: 16px;
      margin-top: 24px;
    }
    .back { display: inline-block; margin-bottom: 28px; font-size: 0.85rem; color: var(--text-dim); text-decoration: none; }
    .back:hover, .back:focus-visible { color: var(--text); text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <a href="/" class="back">← home</a>
  <h1>Real Analysis</h1>
  <p class="subtitle">Interactive visualizations for real analysis concepts.</p>
  <p class="placeholder">This will be real analysis stuff here.</p>
</body>
</html>
